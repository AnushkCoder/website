<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Anushk's personal website" />
  <title>Anushk | Personal Website</title>
  <style>
    :root {
      --bg-start: #f4f7fb;
      --bg-end: #e8efe7;
      --card: #ffffff;
      --text: #1a1a1a;
      --muted: #5f6b73;
      --accent: #0a7c66;
      --accent-strong: #086553;
      --ring: rgba(10, 124, 102, 0.25);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Avenir Next", "Segoe UI", sans-serif;
      background: radial-gradient(circle at top left, #ffffff 10%, transparent 30%),
                  linear-gradient(145deg, var(--bg-start), var(--bg-end));
      color: var(--text);
      display: grid;
      place-items: center;
      padding: 24px;
    }

    .card {
      width: min(820px, 100%);
      background: var(--card);
      border: 1px solid #d7e1de;
      border-radius: 20px;
      padding: clamp(24px, 5vw, 48px);
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.08);
    }

    .kicker {
      margin: 0;
      font-size: 0.92rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--accent);
      font-weight: 700;
    }

    h1 {
      margin: 12px 0 10px;
      font-size: clamp(2rem, 5vw, 3.6rem);
      line-height: 1.08;
    }

    .lead {
      margin: 0;
      max-width: 58ch;
      color: var(--muted);
      font-size: clamp(1rem, 2.2vw, 1.2rem);
      line-height: 1.6;
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-top: 28px;
    }

    .btn {
      text-decoration: none;
      padding: 12px 18px;
      border-radius: 999px;
      font-weight: 600;
      border: 1px solid transparent;
      transition: transform 140ms ease, box-shadow 140ms ease, background-color 140ms ease;
    }

    .btn-primary {
      background: var(--accent);
      color: #fff;
      box-shadow: 0 8px 18px var(--ring);
    }

    .btn-primary:hover {
      background: var(--accent-strong);
      transform: translateY(-1px);
    }

    .btn-secondary {
      background: #f6fbf9;
      border-color: #c3d9d2;
      color: #20453c;
    }

    .btn-secondary:hover {
      background: #eaf5f1;
      transform: translateY(-1px);
    }

    footer {
      margin-top: 28px;
      color: var(--muted);
      font-size: 0.95rem;
    }
  </style>
</head>
<body>
  <main class="card">
    <p class="kicker">Personal Website</p>
    <h1>Hi, I'm Anushk.</h1>
    <p class="lead">
      Welcome to my homepage. I'm building projects, learning every day, and sharing what I create.
      This site is now live from GitHub Pages.
    </p>

    <div class="actions">
      <a class="btn btn-primary" href="https://github.com/AnushkCoder" target="_blank" rel="noopener noreferrer">View GitHub</a>
      <a class="btn btn-secondary" href="mailto:hello@example.com">Contact Me</a>
    </div>

    <footer>© <span id="year"></span> Anushk</footer>
  </main>

  <script>
    document.getElementById('year').textContent = new Date().getFullYear();
  </script>
</body>
</html>
